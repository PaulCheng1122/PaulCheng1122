<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">What I build</title>
<desc id="d">Sand-colored section block. The eyebrow and serif title rise in, then three inner cards — LLM apps, multi-model routing, observability — raise into place with a staggered cascade.</desc>
<style>
  .serif{font-family:Georgia,Charter,"Iowan Old Style","Times New Roman",serif}
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  .mono{font-family:"SF Mono","DM Mono","JetBrains Mono",ui-monospace,Menlo,monospace}
  .rise{opacity:0;animation:rise .75s cubic-bezier(.25,1,.5,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card{opacity:0;animation:craise .45s cubic-bezier(.25,1,.5,1) both}
  @keyframes craise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
<rect width="1200" height="380" rx="16" fill="#e3dacc"/>
<text class="mono rise" style="animation-delay:.05s" x="48" y="64" font-size="12" letter-spacing="2" fill="#5e5d59">WHAT I BUILD</text>
<text class="serif rise" style="animation-delay:.12s" x="46" y="116" font-size="38" fill="#141413">Turning AI demos into production</text>
<g class="card" style="animation-delay:.22s">
  <rect x="48" y="150" width="352" height="186" rx="8" fill="#19191919"/>
  <text class="mono" x="74" y="190" font-size="11" letter-spacing="1.5" fill="#5e5d59">01 · LLM APPS</text>
  <text class="serif" x="73" y="224" font-size="22" fill="#141413">Streaming + RAG</text>
  <text class="sans" x="74" y="258" font-size="14.5" fill="#30302e">Function-calling, tool-use, and</text>
  <text class="sans" x="74" y="280" font-size="14.5" fill="#30302e">DONE-signal parsing over fully</text>
  <text class="sans" x="74" y="302" font-size="14.5" fill="#30302e">observable model calls.</text>
</g>
<g class="card" style="animation-delay:.30s">
  <rect x="424" y="150" width="352" height="186" rx="8" fill="#19191919"/>
  <text class="mono" x="450" y="190" font-size="11" letter-spacing="1.5" fill="#5e5d59">02 · ROUTING</text>
  <text class="serif" x="449" y="224" font-size="22" fill="#141413">Multi-model</text>
  <text class="sans" x="450" y="258" font-size="14.5" fill="#30302e">Qwen, GLM, DeepSeek, DashScope</text>
  <text class="sans" x="450" y="280" font-size="14.5" fill="#30302e">and OpenRouter behind a single</text>
  <text class="sans" x="450" y="302" font-size="14.5" fill="#30302e">routing layer.</text>
</g>
<g class="card" style="animation-delay:.38s">
  <rect x="800" y="150" width="352" height="186" rx="8" fill="#19191919"/>
  <text class="mono" x="826" y="190" font-size="11" letter-spacing="1.5" fill="#5e5d59">03 · SIGNALS</text>
  <text class="serif" x="825" y="224" font-size="22" fill="#141413">Observability</text>
  <text class="sans" x="826" y="258" font-size="14.5" fill="#30302e">Logged calls, latency, tokens</text>
  <text class="sans" x="826" y="280" font-size="14.5" fill="#30302e">and tool traces you can open</text>
  <text class="sans" x="826" y="302" font-size="14.5" fill="#30302e">up and inspect.</text>
</g>
</svg>
