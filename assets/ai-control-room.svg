<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Paul Cheng AI Engineering Control Room</title>
  <desc id="desc">Animated dashboard-style banner for a GitHub profile, showing model routing, token streams, logs, and full-stack AI engineering signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.42" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#171321"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#50E3C2" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#50E3C2"/>
      <stop offset="1" stop-color="#78DCE8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hotLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5C8A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F8D66D"/>
      <stop offset="1" stop-color="#78DCE8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#78DCE8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#78DCE8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#28364A" stroke-width="1" opacity="0.36"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.30  0 0 0 0 0.89  0 0 0 0 0.88  0 0 0 0.85 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 12px; letter-spacing: 1.2px; }
      .small { font-size: 15px; }
      .medium { font-size: 18px; }
      .title { font-size: 58px; font-weight: 780; letter-spacing: 0; }
      .label { fill: #8EA3B8; }
      .text { fill: #D6E2F0; }
      .cyan { fill: #78DCE8; }
      .green { fill: #50E3C2; }
      .amber { fill: #F8D66D; }
      .pink { fill: #FF5C8A; }
      .panel { fill: rgba(13, 17, 23, 0.72); stroke: rgba(120, 220, 232, 0.28); }
      .line { stroke-dasharray: 8 12; animation: dash 7s linear infinite; }
      .fast { animation-duration: 4.5s; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .pulse2 { animation: pulse 3.2s ease-in-out infinite; }
      .blink { animation: blink 1.4s steps(2, start) infinite; }
      @keyframes dash { to { stroke-dashoffset: -120; } }
      @keyframes pulse { 0%, 100% { opacity: 0.46; } 50% { opacity: 1; } }
      @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.25; } }
    </style>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <circle cx="630" cy="162" r="250" fill="url(#glow)" opacity="0.85"/>
  <circle cx="1090" cy="54" r="150" fill="#FF5C8A" opacity="0.07"/>
  <circle cx="94" cy="318" r="180" fill="#F8D66D" opacity="0.05"/>

  <g opacity="0.48">
    <path d="M0 70H1200" stroke="#78DCE8" stroke-opacity="0.16"/>
    <path d="M0 147H1200" stroke="#78DCE8" stroke-opacity="0.11"/>
    <path d="M0 265H1200" stroke="#78DCE8" stroke-opacity="0.10"/>
  </g>

  <g transform="translate(54 54)">
    <text class="mono tiny green" x="0" y="0">SYSTEM PROFILE / ONLINE</text>
    <text class="sans title text" x="0" y="68">Paul Cheng</text>
    <text class="mono medium label" x="2" y="105">Full-stack TypeScript developer</text>
    <text class="mono medium label" x="2" y="132">LLM applications</text>
    <text class="mono medium label" x="2" y="159">AI engineering workflows</text>

    <g transform="translate(0 188)">
      <rect width="118" height="34" rx="8" class="panel"/>
      <circle class="pulse" cx="18" cy="17" r="5" fill="#50E3C2"/>
      <text class="mono tiny text" x="34" y="21">STREAMING</text>
    </g>
    <g transform="translate(130 188)">
      <rect width="86" height="34" rx="8" class="panel"/>
      <circle class="pulse2" cx="18" cy="17" r="5" fill="#F8D66D"/>
      <text class="mono tiny text" x="34" y="21">RAG</text>
    </g>
    <g transform="translate(228 188)">
      <rect width="112" height="34" rx="8" class="panel"/>
      <circle class="pulse" cx="18" cy="17" r="5" fill="#78DCE8"/>
      <text class="mono tiny text" x="34" y="21">TOOL USE</text>
    </g>
    <g transform="translate(352 188)">
      <rect width="154" height="34" rx="8" class="panel"/>
      <circle class="pulse2" cx="18" cy="17" r="5" fill="#FF5C8A"/>
      <text class="mono tiny text" x="34" y="21">OBSERVABILITY</text>
    </g>
  </g>

  <g transform="translate(570 56)">
    <rect width="310" height="228" rx="16" fill="#0B1220" fill-opacity="0.78" stroke="#78DCE8" stroke-opacity="0.34"/>
    <text class="mono tiny cyan" x="22" y="34">MODEL ROUTER</text>
    <text class="mono small label" x="22" y="60">providers.attach()</text>

    <path class="line fast" d="M73 118 C111 85, 166 78, 230 92" stroke="url(#cyanLine)" stroke-width="2.5" fill="none"/>
    <path class="line" d="M73 118 C120 126, 162 146, 230 145" stroke="url(#hotLine)" stroke-width="2.5" fill="none"/>
    <path class="line" d="M73 118 C118 169, 171 181, 232 197" stroke="url(#cyanLine)" stroke-width="2.5" fill="none"/>

    <g filter="url(#softGlow)">
      <circle cx="73" cy="118" r="30" fill="#0F1D2E" stroke="#50E3C2" stroke-width="2"/>
      <text class="mono tiny green" x="45" y="123">ROUTE</text>
    </g>

    <g>
      <rect x="214" y="70" width="72" height="36" rx="9" fill="#111927" stroke="#78DCE8" stroke-opacity="0.45"/>
      <text class="mono tiny text" x="232" y="93">QWEN</text>
      <rect x="214" y="126" width="72" height="36" rx="9" fill="#111927" stroke="#F8D66D" stroke-opacity="0.5"/>
      <text class="mono tiny text" x="224" y="149">DEEPSEEK</text>
      <rect x="214" y="182" width="72" height="36" rx="9" fill="#111927" stroke="#FF5C8A" stroke-opacity="0.45"/>
      <text class="mono tiny text" x="238" y="205">GLM</text>
    </g>
  </g>

  <g transform="translate(900 54)">
    <rect width="272" height="238" rx="16" fill="#0B1220" fill-opacity="0.82" stroke="#F8D66D" stroke-opacity="0.28"/>
    <text class="mono tiny amber" x="20" y="34">LLM CALL TRACE</text>
    <text class="mono small label" x="20" y="62">loggedLlmCall()</text>
    <rect x="20" y="82" width="232" height="118" rx="10" fill="#070D16" stroke="#27384D"/>
    <text class="mono tiny green" x="34" y="108">status: streaming</text>
    <text class="mono tiny cyan" x="34" y="133">tokens: 1284</text>
    <text class="mono tiny amber" x="34" y="158">tools: 3 calls</text>
    <text class="mono tiny pink" x="34" y="183">done: parsed</text>
    <rect class="blink" x="34" y="211" width="86" height="8" rx="4" fill="#78DCE8"/>
    <rect x="130" y="211" width="58" height="8" rx="4" fill="#50E3C2" opacity="0.62"/>
    <rect x="196" y="211" width="32" height="8" rx="4" fill="#F8D66D" opacity="0.72"/>
  </g>

  <g opacity="0.9">
    <path class="line" d="M90 316H1110" stroke="url(#cyanLine)" stroke-width="2"/>
    <circle cx="178" cy="316" r="4" fill="#50E3C2">
      <animate attributeName="cx" from="90" to="1110" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="316" r="4" fill="#F8D66D">
      <animate attributeName="cx" from="90" to="1110" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text class="mono tiny label" x="54" y="334">AI ENGINEERING CONTROL ROOM</text>
  <text class="mono tiny label" x="930" y="334">NEXT.JS / NODE / RAG / TOOLS</text>
</svg>
