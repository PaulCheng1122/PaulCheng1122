<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">How I work</title>
<desc id="d">Sage-green section block. Engineering-style lines rise in on the left while a hand-drawn node graph draws itself in stroke by stroke on the right.</desc>
<style>
  .serif{font-family:Georgia,Charter,"Iowan Old Style","Times New Roman",serif}
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  .mono{font-family:"SF Mono","DM Mono","JetBrains Mono",ui-monospace,Menlo,monospace}
  .rise{opacity:0;animation:rise .75s cubic-bezier(.25,1,.5,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .draw{fill:none;stroke:#141413;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.4s cubic-bezier(.25,1,.5,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .dot{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .5s cubic-bezier(.34,1.4,.5,1) both}
  @keyframes pop{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
</style>
<rect width="1200" height="360" rx="16" fill="#bcd1ca"/>
<text class="mono rise" style="animation-delay:.05s" x="48" y="64" font-size="12" letter-spacing="2" fill="#30302e">HOW I WORK</text>
<text class="serif rise" style="animation-delay:.12s" x="46" y="116" font-size="36" fill="#141413">Engineering style</text>
<g class="sans" font-size="17" fill="#1f2420">
  <g class="rise" style="animation-delay:.24s"><circle cx="54" cy="159" r="4" fill="#d97757"/><text x="74" y="164">Product thinking before implementation detail.</text></g>
  <g class="rise" style="animation-delay:.33s"><circle cx="54" cy="199" r="4" fill="#d97757"/><text x="74" y="204">Small, reviewable changes over big rewrites.</text></g>
  <g class="rise" style="animation-delay:.42s"><circle cx="54" cy="239" r="4" fill="#d97757"/><text x="74" y="244">Explicit architecture decisions through ADRs.</text></g>
  <g class="rise" style="animation-delay:.51s"><circle cx="54" cy="279" r="4" fill="#d97757"/><text x="74" y="284">AI as engineering leverage, not a shortcut.</text></g>
</g>
<g transform="translate(40,0)">
  <path class="draw" pathLength="1" style="animation-delay:.5s"  d="M946 118 Q1006 150 1066 132"/>
  <path class="draw" pathLength="1" style="animation-delay:.7s"  d="M952 132 Q940 200 996 256"/>
  <path class="draw" pathLength="1" style="animation-delay:.9s"  d="M1066 146 Q1086 210 1018 256"/>
  <circle class="draw" pathLength="1" style="animation-delay:1.05s" cx="946" cy="120" r="26"/>
  <circle class="draw" pathLength="1" style="animation-delay:1.2s"  cx="1074" cy="134" r="26"/>
  <circle class="draw" pathLength="1" style="animation-delay:1.35s" cx="1006" cy="262" r="26"/>
  <circle class="dot" style="animation-delay:1.7s" cx="946" cy="120" r="7" fill="#d97757"/>
</g>
</svg>
