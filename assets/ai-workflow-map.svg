<svg width="1100" height="500" viewBox="0 0 1100 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI engineering workflow map</title>
  <desc id="desc">A quiet editorial workflow map showing product intent, application layer, model layer, observability, and team adoption.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#F1E7D8"/>
    </linearGradient>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .ink { fill: #211F1B; }
      .muted { fill: #6F665A; }
      .brown { fill: #8A5E3B; }
      .sage { fill: #5E6F64; }
      .blue { fill: #2F4B5B; }
      .panel { fill: rgba(255, 252, 246, 0.74); stroke: #CDBEAC; }
      .soft { fill: #EFE4D5; stroke: #CDBEAC; }
      .line { stroke: #A99A89; stroke-width: 1.4; }
      .dash { stroke: #A99A89; stroke-width: 1.4; stroke-dasharray: 5 8; }
      .rule { stroke: #211F1B; opacity: 0.78; }
      .micro { font-size: 12px; letter-spacing: 1.4px; }
      .label { font-size: 17px; }
      .small { font-size: 14px; }
      .title { font-size: 34px; font-weight: 500; letter-spacing: -0.2px; }
    </style>
  </defs>

  <rect width="1100" height="500" rx="6" fill="url(#bg)"/>
  <path d="M42 62H1058" class="rule"/>
  <text class="mono micro muted" x="42" y="44">WORKFLOW MAP</text>
  <text class="serif title ink" x="42" y="108">From product intent to reliable AI-assisted engineering</text>
  <text class="sans label muted" x="42" y="140">A practical loop for building, observing, and adopting LLM systems.</text>

  <g transform="translate(64 202)">
    <rect class="panel" width="176" height="104" rx="2"/>
    <text class="mono micro muted" x="22" y="32">01 / INTENT</text>
    <text class="sans label ink" x="22" y="62">Product question</text>
    <text class="sans small muted" x="22" y="84">What should this help?</text>
  </g>

  <g transform="translate(292 202)">
    <rect class="panel" width="176" height="104" rx="2"/>
    <text class="mono micro muted" x="22" y="32">02 / APP</text>
    <text class="sans label ink" x="22" y="62">Next.js + APIs</text>
    <text class="sans small muted" x="22" y="84">State, routes, data</text>
  </g>

  <g transform="translate(520 202)">
    <rect class="panel" width="176" height="104" rx="2"/>
    <text class="mono micro muted" x="22" y="32">03 / MODEL</text>
    <text class="sans label ink" x="22" y="62">Multi-provider LLM</text>
    <text class="sans small muted" x="22" y="84">Qwen, GLM, DeepSeek</text>
  </g>

  <g transform="translate(748 202)">
    <rect class="panel" width="176" height="104" rx="2"/>
    <text class="mono micro muted" x="22" y="32">04 / SIGNAL</text>
    <text class="sans label ink" x="22" y="62">Observe calls</text>
    <text class="sans small muted" x="22" y="84">Tokens, tools, latency</text>
  </g>

  <path d="M240 254H292" class="line"/>
  <path d="M468 254H520" class="line"/>
  <path d="M696 254H748" class="line"/>
  <path d="M836 306C836 374 270 374 152 306" class="dash"/>

  <circle cx="266" cy="254" r="5" class="brown"/>
  <circle cx="494" cy="254" r="5" class="sage"/>
  <circle cx="722" cy="254" r="5" class="blue"/>

  <g transform="translate(178 372)">
    <rect class="soft" width="744" height="70" rx="2"/>
    <text class="mono micro muted" x="24" y="30">TEAM ADOPTION LOOP</text>
    <text class="sans label ink" x="24" y="53">Codex / Claude Code -> reviewable changes -> ADRs -> repeatable practice</text>
  </g>

  <g transform="translate(946 190)">
    <path d="M0 0V140" class="rule"/>
    <text class="mono micro muted" x="24" y="16">CURRENT FOCUS</text>
    <text class="sans small ink" x="24" y="48">Streaming</text>
    <text class="sans small ink" x="24" y="74">RAG</text>
    <text class="sans small ink" x="24" y="100">Function calls</text>
    <text class="sans small ink" x="24" y="126">AI workflows</text>
  </g>
</svg>
