name: Refresh profile SVG

# Regenerates assets/profile.svg (the whole one-piece profile, including the
# contribution heat-map band) from the public contribution graph so the README
# stays current. With "Include private contributions on my profile" enabled,
# this reflects the fuller graph automatically.

on:
  schedule:
    - cron: "17 4 * * *"        # daily, 04:17 UTC
  workflow_dispatch:             # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - scripts/gen_profile.py
      - .github/workflows/activity.yml

permissions:
  contents: write

concurrency:
  group: profile-svg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate profile SVG
        run: python3 scripts/gen_profile.py "${{ github.repository_owner }}" assets/profile.svg
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/profile.svg)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/profile.svg
            git commit -m "chore: refresh profile SVG"
            git push
          else
            echo "No change in profile SVG."
          fi
