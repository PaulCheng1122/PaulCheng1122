name: Refresh activity graph

# Regenerates assets/06-activity.svg from the public contribution graph so the
# README heat-map stays current. Once "Include private contributions on my
# profile" is enabled in GitHub settings, this picks up the fuller (~private)
# graph automatically on the next run.

on:
  schedule:
    - cron: "17 4 * * *"        # daily, 04:17 UTC
  workflow_dispatch:             # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - scripts/gen_activity.py
      - .github/workflows/activity.yml

permissions:
  contents: write

concurrency:
  group: activity-graph
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate activity SVG
        run: python3 scripts/gen_activity.py "${{ github.repository_owner }}" assets/06-activity.svg
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/06-activity.svg)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/06-activity.svg
            git commit -m "chore: refresh GitHub activity graph"
            git push
          else
            echo "No change in activity graph."
          fi
